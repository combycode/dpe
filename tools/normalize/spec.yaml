name: "normalize"
runtime: "rust"
description: "Row-level universal normaliser: dictionary replacement, type coercion, header renaming, shape transforms, dynamic templates, require-field guards. Supports profile dispatch for heterogeneous input."

settings:
  type: object
  additionalProperties: false
  properties:
    rulebook:
      type: string
      required: true
      description: "Path to a YAML/JSON rulebook (flat rules OR per-profile rules)"
    on_unmatched:
      type: string
      enum: ["passthrough", "drop", "error"]
      default: "passthrough"
      description: "What to do when no profile matches an envelope"
    on_error:
      type: string
      enum: ["trace", "null", "passthrough", "drop", "error", "quarantine"]
      default: "trace"
      description: "Per-rule failure handling"

input:
  description: "Any envelope. Profile dispatch (when configured) selects rules based on the envelope's shape."

output:
  description: "Envelope with rules applied to `v`. Specific shape depends on the rulebook."

# Rulebook grammar (separate file referenced by settings.rulebook):
#   - Flat form:    rules: [<op>, <op>, ...]
#   - Profile form: profiles: { <name>: { match: ..., rules: [...] }, ... }
#   - Ops:  dict | parse | rename | compute | template | require | shape
#   See docs/tools/normalize.md for the full grammar.
