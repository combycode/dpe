name: "write-file-stream"
runtime: "rust"
description: "Append envelopes to files. LRU-bounded handle pool, periodic flush, automatic mkdir; safe for many-files-at-once workloads."

settings:
  type: object
  additionalProperties: false
  properties:
    default_file:
      type: string
      required: true
      description: "Path used when input envelope's `v.file` is absent"
    format:
      type: string
      enum: ["ndjson", "lines", "csv"]
      default: "ndjson"
    max_open:
      type: integer
      minimum: 1
      default: 32
      description: "LRU cap on concurrent open file handles"
    idle_close_ms:
      type: integer
      minimum: 0
      default: 30000
      description: "Close handles idle longer than this (milliseconds)"
    flush_every:
      type: integer
      minimum: 1
      default: 1000
      description: "Flush after N rows per file"
    write_mode:
      type: string
      enum: ["append", "truncate"]
      default: "append"
      description: |
        How the file is opened on its FIRST write within this process.
        - "append" (default): file opened in append mode every time. Reruns grow it.
        - "truncate": truncate on first open per path; subsequent reopens
          (after LRU eviction) APPEND. Reruns produce identical file contents
          rather than doubling. Backward-compat default is "append".
    csv_header:
      type: array
      items: { type: string }
      description: "csv only — column order; first write to each file emits header row"
    pass_through:
      type: boolean
      default: false
      description: |
        When `false` (default), this stage is a TERMINAL sink: it writes
        the row to disk and emits nothing to stdout. Downstream stages
        cannot chain off it.
        When `true`, after a successful disk write the input envelope is
        forwarded unchanged via ctx.output, so downstream stages can
        chain on the same stream without an upstream `spread` builtin.

input:
  description: "Envelope to append. If `v.row` is absent, the whole `v` is written."
  properties:
    file:
      type: string
      description: "Optional override of settings.default_file"
    row:
      description: "Payload to write (any JSON value or object matching csv_header)"

output:
  description: |
    Terminal sink by default — does NOT emit to stdout. Set
    `pass_through: true` to forward each input envelope unchanged after
    the disk write, so downstream stages can chain.
